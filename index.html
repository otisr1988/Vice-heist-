<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vice Heist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Vice Heist</h1>
        <div class="info-bar">
            <span>Balance: $<span id="balance">1000.00</span></span>
            <span>Bet: $<input type="number" id="betAmount" value="1.00" min="0.10" step="0.10"></span>
            <span>Win: $<span id="winAmount">0.00</span></span>
        </div>
        
        <div class="reels-container">
            <div class="reel" id="reel0"></div>
            <div class="reel" id="reel1"></div>
            <div class="reel" id="reel2"></div>
            <div class="reel" id="reel3"></div>
            <div class="reel" id="reel4"></div>
        </div>
        
        <div class="controls">
            <button id="spinBtn" class="spin-btn">SPIN</button>
            <button id="bonusBtn" class="bonus-btn">BUY BONUS (100x)</button>
        </div>
        
        <div class="message" id="message">Good luck!</div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
