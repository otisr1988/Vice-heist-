<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vice Heist - StakeEngine Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@stakeengine/web-sdk@latest/dist/stakeengine.min.js"></script>
</head>
<body>
    <div id="game-container">
        <header>
            <h1>🔫 Vice Heist</h1>
            <div id="balance-display">Balance: <span id="balance">0.00</span></div>
        </header>
        <main>
            <div id="game-board">
                <div class="heist-scene">
                    <div id="target-vault">🏦</div>
                    <div id="loot-display">💰 Loot: <span id="loot">0</span></div>
                </div>
                <div class="controls">
                    <div class="bet-section">
                        <label>Bet Amount:</label>
                        <input type="number" id="bet-amount" min="1" step="0.01" value="10">
                        <button id="place-bet">Place Bet</button>
                    </div>
                    <div class="action-buttons">
                        <button id="start-heist" disabled>Start Heist 🚗</button>
                        <button id="cash-out" disabled>Cash Out 💵</button>
                        <button id="auto-play">Auto Play 🔄</button>
                    </div>
                </div>
                <div id="game-log"></div>
            </div>
            <div id="provably-fair">
                <h3>🔐 Provably Fair</h3>
                <div id="seed-display">Server Seed: <span id="server-seed">Hidden</span></div>
                <div id="hash-display">Hash: <span id="hash">-</span></div>
                <button id="verify-fairness">Verify Fairness</button>
            </div>
        </main>
        <footer>
            <p>Powered by StakeEngine | Provably Fair Gaming</p>
        </footer>
    </div>
    <script src="game.js"></script>
</body>
</html>
